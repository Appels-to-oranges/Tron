<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRON & Frogger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- JOIN SCREEN -->
  <div id="joinScreen">
    <h1>TRON & Frogger</h1>
    <p class="subtitle">Multiplayer Arcade</p>
    <form id="joinForm" autocomplete="off">
      <input type="text" id="nicknameInput" placeholder="Nickname" maxlength="20" required>
      <input type="text" id="roomInput" placeholder="Room key (default)" maxlength="30">
      <div class="gameTypeSelect">
        <label class="gameTypeOption">
          <input type="radio" name="gameType" value="tron" checked>
          <span class="gameTypeLabel">Tron</span>
        </label>
        <label class="gameTypeOption">
          <input type="radio" name="gameType" value="frogger">
          <span class="gameTypeLabel">Frogger</span>
        </label>
      </div>
      <button type="submit">Enter Arena</button>
    </form>
    <div id="joinError"></div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen">
    <div id="topBar">
      <span id="roomLabel"></span>
      <span id="gameTypeLabel"></span>
      <div id="playerList"></div>
    </div>

    <div id="canvasWrap">
      <canvas id="gameCanvas"></canvas>

      <div id="overlay">
        <div id="overlayTitle">Waiting for players...</div>
        <div id="overlaySubtitle"></div>
        <button id="overlayBtn" style="display:none">Start Game</button>
      </div>

      <div id="countdownDisplay" class="hidden"></div>
    </div>

    <div id="controlsHint">Arrow keys or WASD to steer</div>
  </div>

  <script src="client.js"></script>
</body>
</html>
